name: Deploy LanzaTaxi

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      - name: Install Dependencies
        run: composer install --no-progress
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Node dependencies
        run: npm ci
      - name: Build Frontend
        run: npm run build
      - name: Prepare Testing Environment
        run: |
          cp .env.example .env
          php artisan key:generate --force
      - name: Run Tests
        run: php artisan test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Precheck deploy secrets
        id: precheck
        shell: bash
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          if [ -z "$HOST" ] || [ -z "$USERNAME" ] || [ -z "$SSH_KEY" ]; then
            echo "Faltan secrets (HOST/USERNAME/SSH_KEY). Se omite el deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate deploy secrets
        if: ${{ steps.precheck.outputs.skip != 'true' }}
        shell: bash
        env:
          HOST: ${{ secrets.HOST }}
          USERNAME: ${{ secrets.USERNAME }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
        run: |
          if [ -z "$HOST" ]; then
            echo "Missing required secret: HOST"
            exit 1
          fi
          if [ -z "$USERNAME" ]; then
            echo "Missing required secret: USERNAME"
            exit 1
          fi
          if [ -z "$SSH_KEY" ]; then
            echo "Missing required secret: SSH_KEY"
            exit 1
          fi
      - name: Deploy to Server
        if: ${{ steps.precheck.outputs.skip != 'true' }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          script: |
            cd /var/www/lanzataxi/current
            git pull origin main
            composer install --no-dev --optimize-autoloader
            php artisan migrate --force
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            npm ci
            npm run build
            sudo systemctl reload nginx
