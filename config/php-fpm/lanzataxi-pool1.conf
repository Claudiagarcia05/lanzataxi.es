; =============================================================================
; PHP-FPM — Pool 1 de LanzaTaxi (Alta Disponibilidad)
;
; Este fichero reemplaza/renombra el pool principal (www) para que tenga
; nombre y socket explícitos, y así Nginx pueda referenciarlo junto al pool2.
;
; Instalar:
;   sudo cp config/php-fpm/lanzataxi-pool1.conf /etc/php/8.2/fpm/pool.d/lanzataxi-pool1.conf
;   # Deshabilitar pool www por defecto (o dejarlo si lo usas para otros proyectos)
;   sudo mv /etc/php/8.2/fpm/pool.d/www.conf /etc/php/8.2/fpm/pool.d/www.conf.disabled
;   sudo systemctl reload php8.2-fpm
; =============================================================================

[lanzataxi-pool1]

user  = www-data
group = www-data

; Socket Unix exclusivo para este pool (pool1)
listen = /run/php/lanzataxi-pool1.sock

listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; ── Gestión de procesos ──────────────────────────────────────────────────────
pm = dynamic
pm.max_children      = 10
pm.start_servers     = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests      = 500

; ── Timeouts ─────────────────────────────────────────────────────────────────
request_terminate_timeout = 120s
request_slowlog_timeout   = 10s

; ── Logs ─────────────────────────────────────────────────────────────────────
slowlog      = /var/log/lanzataxi-pool1-slow.log
access.log   = /var/log/lanzataxi-pool1-access.log
access.format = "%R - %u %t \"%m %r\" %s %f %{seconds}d %{kilo}M %C%%"

php_flag[display_errors]        = off
php_admin_flag[log_errors]      = on
php_admin_value[error_log]      = /var/log/lanzataxi-pool1-errors.log
php_admin_value[memory_limit]   = 256M
php_admin_value[date.timezone]  = Europe/Madrid

clear_env = yes
env[HOSTNAME] = $HOSTNAME
env[PATH]     = /usr/local/bin:/usr/bin:/bin
env[TMP]      = /tmp
env[TMPDIR]   = /tmp
env[TEMP]     = /tmp

pm.status_path = /fpm-status-pool1
ping.path      = /fpm-ping-pool1
ping.response  = pong
