; =============================================================================
; PHP-FPM — Pool 2 de LanzaTaxi (Alta Disponibilidad)
;
; Este fichero define un segundo pool PHP-FPM que, junto con el pool principal
; (www o lanzataxi-pool1), forma el clúster de 2 nodos backend para HA.
; Nginx distribuye las peticiones en round-robin entre ambos sockets.
;
; Instalar:
;   sudo cp config/php-fpm/lanzataxi-pool2.conf /etc/php/8.2/fpm/pool.d/lanzataxi-pool2.conf
;   sudo systemctl reload php8.2-fpm
;
; Verificar que ambos sockets existen:
;   ls -la /run/php/lanzataxi-pool*.sock
; =============================================================================

[lanzataxi-pool2]

; Usuario y grupo bajo el que corre este pool (igual que el pool principal)
user  = www-data
group = www-data

; Socket Unix exclusivo para este pool
listen = /run/php/lanzataxi-pool2.sock

; Permisos del socket: solo nginx (www-data) puede escribir
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; ── Gestión de procesos ──────────────────────────────────────────────────────
; dynamic: el número de workers crece/decrece según la carga.
pm = dynamic

; Máximo de workers simultáneos
pm.max_children = 10

; Workers que arrancan con PHP-FPM
pm.start_servers = 2

; Mínimo de workers en espera (idle)
pm.min_spare_servers = 1

; Máximo de workers en espera
pm.max_spare_servers = 4

; Reiniciar un worker tras N peticiones (previene memory leaks)
pm.max_requests = 500

; ── Timeouts ─────────────────────────────────────────────────────────────────
request_terminate_timeout = 120s
request_slowlog_timeout   = 10s

; ── Logs ─────────────────────────────────────────────────────────────────────
slowlog      = /var/log/php8.2-fpm/lanzataxi-pool2-slow.log
access.log   = /var/log/php8.2-fpm/lanzataxi-pool2-access.log
access.format = "%R - %u %t \"%m %r\" %s %f %{seconds}d %{kilo}M %C%%"

; Nivel de reporte de errores (igual que producción)
php_flag[display_errors]        = off
php_admin_flag[log_errors]      = on
php_admin_value[error_log]      = /var/log/php8.2-fpm/lanzataxi-pool2-errors.log
php_admin_value[memory_limit]   = 256M

; Zona horaria
php_admin_value[date.timezone]  = Europe/Madrid

; ── Variables de entorno ──────────────────────────────────────────────────────
; Limpiar el entorno del proceso padre para evitar filtración de variables.
clear_env = yes

; Exponer variables de entorno necesarias para Laravel
env[HOSTNAME] = $HOSTNAME
env[PATH]     = /usr/local/bin:/usr/bin:/bin
env[TMP]      = /tmp
env[TMPDIR]   = /tmp
env[TEMP]     = /tmp

; ── Estado del pool (para monitorización) ─────────────────────────────────────
pm.status_path = /fpm-status-pool2
ping.path      = /fpm-ping-pool2
ping.response  = pong
