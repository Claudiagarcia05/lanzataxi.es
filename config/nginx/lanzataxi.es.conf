# =============================================================================
# /etc/nginx/sites-available/lanzataxi.es
#
# Configuración de producción para lanzataxi.es
#   - Redirección HTTP → HTTPS
#   - HTTPS con TLS 1.2/1.3, cabeceras de seguridad y HSTS
#   - Alta Disponibilidad: upstream con 2 pools PHP-FPM (pool1 + pool2)
#   - Rate limiting para proteger la API
#   - Logs separados por dominio
#
# Copiar al VPS:
#   sudo cp config/nginx/lanzataxi.es.conf /etc/nginx/sites-available/lanzataxi.es
#   sudo ln -sf /etc/nginx/sites-available/lanzataxi.es /etc/nginx/sites-enabled/lanzataxi.es
#   sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ── Rate limiting ────────────────────────────────────────────────────────────
# Zona para la API: 10 req/s por IP
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
# Zona para login/register: 2 req/s por IP (protección fuerza bruta)
limit_req_zone $binary_remote_addr zone=auth:10m rate=2r/s;

# ── Upstream: Alta Disponibilidad ────────────────────────────────────────────
# Nginx distribuye las peticiones entre los dos pools PHP-FPM en round-robin.
# Si uno cae, el otro sigue respondiendo (fail_timeout / max_fails).
upstream lanzataxi_fpm {
    # least_conn: envía la petición al worker con menos conexiones activas.
    least_conn;

    server unix:/run/php/lanzataxi-pool1.sock weight=1 max_fails=3 fail_timeout=30s;
    server unix:/run/php/lanzataxi-pool2.sock weight=1 max_fails=3 fail_timeout=30s;

    keepalive 32;
}

# ── HTTP: Redirigir todo a HTTPS ─────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name lanzataxi.es www.lanzataxi.es;

    # Let's Encrypt ACME challenge (necesario para renovar certificado)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    # Todo lo demás → HTTPS
    location / {
        return 301 https://lanzataxi.es$request_uri;
    }
}

# ── HTTPS: www → apex ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.lanzataxi.es;

    ssl_certificate     /etc/letsencrypt/live/lanzataxi.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lanzataxi.es/privkey.pem;

    return 301 https://lanzataxi.es$request_uri;
}

# ── HTTPS: servidor principal ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name lanzataxi.es;

    root /var/www/lanzataxi/current/public;
    index index.php;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/lanzataxi.es/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lanzataxi.es/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/lanzataxi.es/chain.pem;

    # Solo TLS 1.2 y 1.3 (1.0 y 1.1 deprecados)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
    ssl_prefer_server_ciphers off;

    # OCSP Stapling (mejora rendimiento TLS)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 1.1.1.1 valid=300s;
    resolver_timeout 5s;

    # Sesión TLS (cache compartida entre workers)
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Diffie-Hellman (generar con: openssl dhparam -out /etc/nginx/dhparam.pem 2048)
    # ssl_dhparam /etc/nginx/dhparam.pem;

    # ── Cabeceras de seguridad ────────────────────────────────────────────────
    # HSTS: fuerza HTTPS durante 1 año (incluye subdominios)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Evita clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    # Evita MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;
    # XSS protection (navegadores legacy)
    add_header X-XSS-Protection "1; mode=block" always;
    # Controla info del Referer
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Content Security Policy básica (ajustar si se añaden externos)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google.com/recaptcha/ https://www.gstatic.com/recaptcha/; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://nominatim.openstreetmap.org; frame-src https://www.google.com/recaptcha/;" always;
    # Permissions Policy (deshabilita APIs del navegador no usadas)
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=()" always;

    # Ocultar versión de nginx
    server_tokens off;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/lanzataxi_access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/lanzataxi_error.log warn;

    # ── Límites de request ────────────────────────────────────────────────────
    client_max_body_size 10M;
    client_body_timeout  30s;
    client_header_timeout 30s;
    send_timeout         30s;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # ── Assets estáticos (Vite build) ────────────────────────────────────────
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(ico|jpg|jpeg|png|gif|svg|webp|woff|woff2|ttf|otf|eot)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Rate limit API ────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Rate limit auth endpoints
    location ~ ^/api/(login|register)$ {
        limit_req zone=auth burst=5 nodelay;
        limit_req_status 429;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── SPA catch-all (Laravel + Inertia) ────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM → upstream con HA ─────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass   lanzataxi_fpm;      # <- round-robin entre pool1 y pool2
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        # Timeouts PHP
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    180s;
        fastcgi_read_timeout    180s;
        fastcgi_buffer_size     128k;
        fastcgi_buffers         4 256k;
        fastcgi_busy_buffers_size 256k;

        # Ocultar errores PHP al cliente
        fastcgi_intercept_errors on;
    }

    # Bloquear acceso a archivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Bloquear acceso directo a archivos sensibles
    location ~* \.(env|log|sql|bak|sh)$ {
        deny all;
    }

    # ── Let's Encrypt ACME challenge ─────────────────────────────────────────
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }
}
